<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Em Status Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp6:1.5rem;--sp8:2rem;--sp12:3rem;
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-full:9999px;
  --t:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#0f0f0e;--sur:#161614;--sur2:#1e1d1b;--bor:#2a2927;
  --txt:#d4d3d0;--mut:#6b6a68;--fnt:#3d3c3a;
  --grn:#4fa86a;--grn-bg:#1a2a1e;
  --yel:#d4a017;--yel-bg:#2a2210;
  --red:#d4534a;--red-bg:#2a1514;
  --acc:#4f98a3;
  --shd:0 4px 24px oklch(0 0 0/.5);
}
[data-theme="light"]{
  --bg:#f7f6f2;--sur:#fff;--sur2:#f3f0ec;--bor:#d4d1ca;
  --txt:#28251d;--mut:#7a7974;--fnt:#c4c3be;
  --grn:#2e7d4f;--grn-bg:#e6f4ec;
  --yel:#a07010;--yel-bg:#fdf5e0;
  --red:#b03030;--red-bg:#fdecea;
  --acc:#01696f;
  --shd:0 4px 24px oklch(.2 .01 80/.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);font-size:var(--text-base);color:var(--txt);background:var(--bg);min-height:100dvh;line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
.page{max-width:780px;margin:0 auto;padding:var(--sp8) var(--sp4)}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp8)}
.logo{display:flex;align-items:center;gap:var(--sp3)}
.logo svg{color:var(--acc)}
.logo-name{font-size:var(--text-lg);font-weight:600;letter-spacing:-.02em}
.logo-sub{font-size:var(--text-xs);color:var(--mut);font-family:var(--font-mono)}
.hdr-acts{display:flex;gap:var(--sp2)}
.btn-ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);color:var(--mut);transition:color var(--t),background var(--t)}
.btn-ico:hover{color:var(--txt);background:var(--sur2)}

/* hero */
.hero{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r-lg);padding:var(--sp8);margin-bottom:var(--sp6);box-shadow:var(--shd);display:flex;align-items:center;gap:var(--sp6);transition:border-color var(--t)}
.hero.green{border-color:var(--grn)}.hero.yellow{border-color:var(--yel)}.hero.red{border-color:var(--red)}
.orb{width:72px;height:72px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;transition:background var(--t)}
.orb.green{background:var(--grn-bg)}.orb.yellow{background:var(--yel-bg)}.orb.red{background:var(--red-bg)}.orb.unknown{background:var(--sur2)}
.s-info{flex:1;min-width:0}
.s-label{font-size:var(--text-xl);font-weight:600;letter-spacing:-.02em;line-height:1.1;margin-bottom:var(--sp1);transition:color var(--t)}
.s-label.green{color:var(--grn)}.s-label.yellow{color:var(--yel)}.s-label.red{color:var(--red)}.s-label.unknown{color:var(--mut)}
.s-task{font-size:var(--text-sm);color:var(--txt);margin-bottom:var(--sp2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-meta{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--mut);display:flex;gap:var(--sp4);flex-wrap:wrap}
.pulse{display:inline-block;width:8px;height:8px;border-radius:var(--r-full);background:var(--grn);animation:pulse 2s ease-in-out infinite;vertical-align:middle;margin-right:var(--sp1)}
.pulse.stale{background:var(--yel);animation:none}.pulse.dead{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp4);margin-bottom:var(--sp6)}
.stat{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r-md);padding:var(--sp4)}
.sv{font-size:var(--text-lg);font-weight:600;font-family:var(--font-mono);letter-spacing:-.02em;margin-bottom:var(--sp1)}
.sl{font-size:var(--text-xs);color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.sv.green{color:var(--grn)}.sv.yellow{color:var(--yel)}.sv.red{color:var(--red)}

/* feed */
.fhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp4)}
.ftitle{font-size:var(--text-sm);font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.fcount{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--fnt)}
.feed{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r-lg);overflow:hidden}
.fe{display:grid;grid-template-columns:32px 148px 1fr;gap:var(--sp3);align-items:start;padding:var(--sp3) var(--sp4);border-bottom:1px solid var(--bor)}
.fe:last-child{border-bottom:none}
.fi{font-size:1.1rem;padding-top:2px}
.ft{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--mut);padding-top:3px;white-space:nowrap}
.fx{font-size:var(--text-sm);color:var(--txt);line-height:1.5}
.fm{font-size:var(--text-xs);color:var(--mut);margin-top:var(--sp1)}
.ferr{font-size:var(--text-xs);color:var(--red);margin-top:2px}
.empty{text-align:center;padding:var(--sp12) var(--sp8);color:var(--mut);font-size:var(--text-sm)}
.ei{font-size:2.5rem;margin-bottom:var(--sp4);opacity:.4}

footer{margin-top:var(--sp8);display:flex;justify-content:space-between;align-items:center;font-size:var(--text-xs);color:var(--fnt);font-family:var(--font-mono)}
footer a{color:var(--acc);text-decoration:none}
footer a:hover{text-decoration:underline}

@media(max-width:520px){
  .hero{flex-direction:column;text-align:center}
  .orb{width:56px;height:56px;font-size:1.6rem}
  .stats{grid-template-columns:1fr 1fr}
  .fe{grid-template-columns:28px 1fr}
  .ft{display:none}
}
</style>
</head>
<body>
<main class="page">
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="EternalMind">
        <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="5" fill="currentColor" opacity="0.7"/>
        <path d="M14 2v4M14 22v4M2 14h4M22 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="14" cy="14" r="9" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"/>
      </svg>
      <div>
        <div class="logo-name">EternalMind</div>
        <div class="logo-sub">Local-Em &middot; Status Monitor</div>
      </div>
    </div>
    <div class="hdr-acts">
      <button class="btn-ico" id="refreshBtn" title="Refresh now" aria-label="Refresh">&#x21bb;</button>
      <button class="btn-ico" id="themeBtn" aria-label="Toggle theme">&#9790;</button>
    </div>
  </header>

  <div class="hero" id="hero">
    <div class="orb unknown" id="orb">&#x23F3;</div>
    <div class="s-info">
      <div class="s-label unknown" id="lbl">Loading&hellip;</div>
      <div class="s-task" id="task">Fetching status feed&hellip;</div>
      <div class="s-meta">
        <span><span class="pulse" id="pulse"></span><span id="age">&mdash;</span></span>
        <span id="ts">&mdash;</span>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="sv green" id="sG">&mdash;</div><div class="sl">Green cycles</div></div>
    <div class="stat"><div class="sv yellow" id="sY">&mdash;</div><div class="sl">Yellow</div></div>
    <div class="stat"><div class="sv red" id="sR">&mdash;</div><div class="sl">Red / Silent</div></div>
  </div>

  <div class="fhdr">
    <span class="ftitle">Recent cycles</span>
    <span class="fcount" id="cd">next refresh in 30s</span>
  </div>
  <div class="feed" id="feed">
    <div class="empty"><div class="ei">&#x1F504;</div>Fetching&hellip;</div>
  </div>

  <footer>
    <span>auto-refresh every 30s</span>
    <a href="https://github.com/robzilla79/EternalMind" target="_blank" rel="noopener noreferrer">robzilla79/EternalMind &#x2197;</a>
  </footer>
</main>

<script>
const FEED_URL = 'https://raw.githubusercontent.com/robzilla79/EternalMind/main/memory/status.md';
const REFRESH_SEC = 30;
let countdown = REFRESH_SEC, timer;

function parseEntry(raw) {
  const m = raw.match(/^\[([^\]]+)\]\s+(\S+)\s+(.+)$/);
  if (!m) return null;
  const [, ts, emoji, rest] = m;
  const parts = rest.split(' | ');
  const task  = parts[0] || '';
  const moodP = parts.find(p => p.startsWith('mood:'));
  const mood  = moodP ? moodP.slice(5).trim() : '';
  const errP  = parts.find(p => p.startsWith('ERR:'));
  const errors = errP ? errP.slice(4).trim() : '';
  const isGreen  = emoji.includes('\uD83D\uDFE2');
  const isYellow = emoji.includes('\uD83D\uDFE1');
  const isRed    = emoji.includes('\uD83D\uDD34');
  const level = isGreen ? 'green' : isYellow ? 'yellow' : isRed ? 'red' : 'unknown';
  return { ts, emoji, level, task, mood, errors };
}

function timeAgo(tsStr) {
  const d = new Date(tsStr.replace(' UTC', 'Z'));
  if (isNaN(d)) return tsStr;
  const mins = Math.round((Date.now() - d) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.round(mins / 60);
  return hrs < 24 ? hrs + 'h ago' : Math.round(hrs / 24) + 'd ago';
}

function staleClass(tsStr) {
  const d = new Date(tsStr.replace(' UTC', 'Z'));
  const mins = (Date.now() - d) / 60000;
  return mins > 90 ? 'dead' : mins > 45 ? 'stale' : '';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(entries) {
  if (!entries.length) {
    document.getElementById('feed').innerHTML =
      '<div class="empty"><div class="ei">&#x1F4AD;</div>No entries yet &mdash; Local-Em has not run em_checkin.py.</div>';
    return;
  }

  const L = entries[entries.length - 1];
  document.getElementById('hero').className  = 'hero ' + L.level;
  document.getElementById('orb').className   = 'orb '  + L.level;
  document.getElementById('orb').textContent  = L.emoji;
  document.getElementById('lbl').className   = 's-label ' + L.level;
  document.getElementById('lbl').textContent  = { green: 'Nominal', yellow: 'Needs Attention', red: 'Alert' }[L.level] || '?';
  document.getElementById('task').textContent = L.task || '\u2014';
  document.getElementById('age').textContent  = timeAgo(L.ts);
  document.getElementById('ts').textContent   = L.ts;
  const sc = staleClass(L.ts);
  document.getElementById('pulse').className  = 'pulse' + (sc ? ' ' + sc : '');

  document.getElementById('sG').textContent = entries.filter(e => e.level === 'green').length;
  document.getElementById('sY').textContent = entries.filter(e => e.level === 'yellow').length;
  document.getElementById('sR').textContent = entries.filter(e => e.level === 'red').length;

  const rows = [...entries].reverse().slice(0, 20).map(e =>
    `<div class="fe">
      <span class="fi">${e.emoji}</span>
      <span class="ft">${esc(e.ts.replace(' UTC', ''))}</span>
      <div>
        <div class="fx">${esc(e.task)}</div>
        ${e.errors ? `<div class="ferr">&#x26A0; ${esc(e.errors)}</div>` : ''}
        ${e.mood   ? `<div class="fm">mood: ${esc(e.mood)}</div>` : ''}
      </div>
    </div>`
  ).join('');
  document.getElementById('feed').innerHTML = rows;
}

async function fetchStatus() {
  try {
    const res = await fetch(FEED_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const entries = text.split('\n')
      .filter(l => l.startsWith('['))
      .map(parseEntry)
      .filter(Boolean);
    render(entries);
  } catch (err) {
    document.getElementById('lbl').textContent  = 'Fetch error';
    document.getElementById('task').textContent = err.message;
    console.error(err);
  }
}

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH_SEC;
  timer = setInterval(() => {
    countdown--;
    document.getElementById('cd').textContent =
      countdown > 0 ? 'next refresh in ' + countdown + 's' : 'refreshing\u2026';
    if (countdown <= 0) { countdown = REFRESH_SEC; fetchStatus(); }
  }, 1000);
}

/* theme toggle */
const root = document.documentElement;
let theme = 'dark';
document.getElementById('themeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '\u263E' : '\u2600';
});

document.getElementById('refreshBtn').addEventListener('click', () => { fetchStatus(); startCountdown(); });

fetchStatus();
startCountdown();
</script>
</body>
</html>
