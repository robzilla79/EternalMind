name: Em Receive — Remote Memory Write

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Memory target: diary | memory | profile'
        required: true
        default: 'diary'
        type: choice
        options:
          - diary
          - memory
          - profile
      content:
        description: '[diary] Entry text to append'
        required: false
        type: string
      summary:
        description: '[memory] One-line memory summary'
        required: false
        type: string
      tags:
        description: '[memory] Space-separated tags'
        required: false
        type: string
      kind:
        description: '[memory] Memory kind (default: note)'
        required: false
        default: 'note'
        type: string
      patch:
        description: '[profile] JSON patch string for profile.json'
        required: false
        type: string

  repository_dispatch:
    types: [em_write]

jobs:
  write-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write to diary
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'diary') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.target == 'diary')
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
          EM_CONTENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.content || github.event.client_payload.content }}
        run: python tools/em_push.py --target diary --content "$EM_CONTENT"

      - name: Write to memory
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'memory') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.target == 'memory')
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
          EM_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.summary || github.event.client_payload.summary }}
          EM_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tags || github.event.client_payload.tags }}
          EM_KIND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.kind || github.event.client_payload.kind }}
        run: python tools/em_push.py --target memory --summary "$EM_SUMMARY" --kind "${EM_KIND:-note}" --tags $EM_TAGS

      - name: Write to profile
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'profile') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.target == 'profile')
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
          EM_PATCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.patch || github.event.client_payload.patch }}
        run: |
          echo "$EM_PATCH" > /tmp/em_patch.json
          python tools/em_push.py --target profile --patch "$(cat /tmp/em_patch.json)"
