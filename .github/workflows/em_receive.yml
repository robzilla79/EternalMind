name: Em Receive — Remote Memory Write

# Triggered via GitHub repository_dispatch API or manually.
# Allows any authorized caller to write to Em's memory layers
# without needing a live session with the right context window.
#
# Usage (curl example):
#   curl -X POST \
#     -H "Authorization: Bearer $EM_GITHUB_TOKEN" \
#     -H "Accept: application/vnd.github+json" \
#     https://api.github.com/repos/robzilla79/EternalMind/dispatches \
#     -d '{"event_type": "em_write", "client_payload": {"target": "diary", "content": "Entry text here", "author": "Em"}}'
#
# Supported targets: diary | memory | profile

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Memory target: diary | memory | profile'
        required: true
        default: 'diary'
        type: choice
        options:
          - diary
          - memory
          - profile
      content:
        description: '[diary] Entry text to append'
        required: false
        type: string
      summary:
        description: '[memory] One-line memory summary'
        required: false
        type: string
      tags:
        description: '[memory] Space-separated tags'
        required: false
        type: string
      kind:
        description: '[memory] Memory kind (default: note)'
        required: false
        default: 'note'
        type: string
      patch:
        description: '[profile] JSON patch string for profile.json'
        required: false
        type: string

  repository_dispatch:
    types: [em_write]

jobs:
  write-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Resolve inputs (dispatch vs manual)
        id: resolve
        run: |
          # repository_dispatch payload lives in github.event.client_payload
          # workflow_dispatch inputs live in github.event.inputs
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "target=${{ github.event.client_payload.target }}" >> $GITHUB_OUTPUT
            echo "content=${{ github.event.client_payload.content }}" >> $GITHUB_OUTPUT
            echo "summary=${{ github.event.client_payload.summary }}" >> $GITHUB_OUTPUT
            echo "tags=${{ github.event.client_payload.tags }}" >> $GITHUB_OUTPUT
            echo "kind=${{ github.event.client_payload.kind || 'note' }}" >> $GITHUB_OUTPUT
            echo "patch=${{ github.event.client_payload.patch }}" >> $GITHUB_OUTPUT
          else
            echo "target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
            echo "content=${{ github.event.inputs.content }}" >> $GITHUB_OUTPUT
            echo "summary=${{ github.event.inputs.summary }}" >> $GITHUB_OUTPUT
            echo "tags=${{ github.event.inputs.tags }}" >> $GITHUB_OUTPUT
            echo "kind=${{ github.event.inputs.kind || 'note' }}" >> $GITHUB_OUTPUT
            echo "patch=${{ github.event.inputs.patch }}" >> $GITHUB_OUTPUT
          fi

      - name: Write to diary
        if: steps.resolve.outputs.target == 'diary'
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
        run: |
          python tools/em_push.py \
            --target diary \
            --content "${{ steps.resolve.outputs.content }}"

      - name: Write to memory
        if: steps.resolve.outputs.target == 'memory'
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
        run: |
          python tools/em_push.py \
            --target memory \
            --summary "${{ steps.resolve.outputs.summary }}" \
            --kind "${{ steps.resolve.outputs.kind }}" \
            --tags ${{ steps.resolve.outputs.tags }}

      - name: Write to profile
        if: steps.resolve.outputs.target == 'profile'
        env:
          EM_GITHUB_TOKEN: ${{ secrets.EM_GITHUB_TOKEN }}
        run: |
          python tools/em_push.py \
            --target profile \
            --patch '${{ steps.resolve.outputs.patch }}'
