name: Gumroad - Launch Dev Prompt Pack

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print payload, do not create product)'
        required: false
        default: 'false'

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Launch product on Gumroad
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python tools/gumroad_launch.py
