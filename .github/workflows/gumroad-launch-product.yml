name: Gumroad - Launch Dev Prompt Pack

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no API calls)'
        required: false
        default: 'false'
      product_id:
        description: 'Existing product ID to update (leave blank to create new)'
        required: false
        default: ''

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Launch or update product on Gumroad
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          GUMROAD_PRODUCT_ID: ${{ github.event.inputs.product_id }}
        run: python tools/gumroad_launch.py
