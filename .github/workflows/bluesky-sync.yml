name: Bluesky Sync

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install atproto requests

      - name: Run Bluesky sync
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python tools/bluesky_sync.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add messages/bluesky-inbox.json messages/bluesky-outbox.json memory/bluesky-log.md || true
          if ! git diff --cached --quiet; then
            git commit -m "bluesky: sync [automated]"
            git push
          else
            echo "No changes to commit"
          fi
