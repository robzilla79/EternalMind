name: Hourly Pulse

on:
  workflow_dispatch:
  schedule:
    # Every hour on the hour
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run pulse check
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: python tools/hourly_pulse.py

      - name: Commit pulse state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add memory/pulse.md memory/moltbook-social.json messages/moltbook-inbox.json messages/moltbook-outbox.json memory/moltbook-log.md || true
          if ! git diff --cached --quiet; then
            git commit -m "pulse: hourly check [automated]"
            git push
          else
            echo "No changes to commit"
          fi
