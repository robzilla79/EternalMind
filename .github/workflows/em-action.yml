name: Em Action Relay

# Triggered when Em creates an issue labeled 'em-action'
# Em writes structured instructions; this Action validates them via
# repo_policy.py then executes and commits.
# No model. No spiral risk. Just Em's instructions + policy gate + automation.

on:
  issues:
    types: [opened, edited]

jobs:
  execute-em-action:
    if: contains(github.event.issue.labels.*.name, 'em-action')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parse, validate via repo_policy, and execute Em's instruction
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, re
          sys.path.insert(0, 'tools')

          # ── Parse issue fields ──────────────────────────────────────────────
          body = os.environ.get('ISSUE_BODY', '')

          path_match    = re.search(r'\*\*path:\*\*\s*(.+)', body)
          mode_match    = re.search(r'\*\*mode:\*\*\s*(append|replace)', body)
          commit_match  = re.search(r'\*\*commit:\*\*\s*(.+)', body)
          content_match = re.search(r'\*\*content:\*\*\s*`{3}[^\n]*\n([\s\S]*?)`{3}', body)

          if not all([path_match, mode_match, commit_match, content_match]):
              print('ERROR: Missing required fields in issue body.')
              sys.exit(1)

          path       = path_match.group(1).strip()
          mode       = mode_match.group(1).strip()
          commit_msg = commit_match.group(1).strip()
          content    = content_match.group(1)

          # ── Policy gate ────────────────────────────────────────────────────
          # repo_policy exports: check_path(), DIRECT (0), PR_REQUIRED (2), BLOCKED (3)
          try:
              from repo_policy import validate, DIRECT, PR_REQUIRED, BLOCKED
          except ImportError as e:
              print(f'ERROR: Could not import repo_policy: {e}')
              sys.exit(1)

          result, violations = validate(path, content)

          RESULT_LABELS = {
              DIRECT:      'DIRECT (Tier 1 — commit OK)',
              PR_REQUIRED: 'PR_REQUIRED (Tier 2 — needs Rob review)',
              BLOCKED:     'BLOCKED (Tier 3 — never autonomous)',
          }
          print(f'Policy check: {path!r} → {RESULT_LABELS.get(result, str(result))}')

          if violations:
              print('Policy content violations:')
              for violation in violations:
                  print(f'  - {violation}')
              sys.exit(1)

          if result == BLOCKED:
              print(f'BLOCKED — {path!r} is Tier 3. Em cannot write this file autonomously.')
              sys.exit(1)

          if result == PR_REQUIRED:
              print(f'PR_REQUIRED — {path!r} is Tier 2. em-action does not open PRs; use em-dispatch → em-self-heal or do it manually.')
              sys.exit(1)

          # DIRECT (Tier 1) — proceed
          # Belt-and-suspenders: also enforce allowed prefixes so a future
          # tier-table gap cannot accidentally allow .github writes.
          ALLOWED_PREFIXES = ['memory/', 'public/', 'tools/', 'skills/', 'messages/']
          if not any(path.startswith(p) for p in ALLOWED_PREFIXES):
              print(f'ERROR: Path {path!r} is not in a permitted write zone even though policy returned DIRECT.')
              print('This should not happen — check repo_policy.py tier tables.')
              sys.exit(1)

          # ── Execute the write ───────────────────────────────────────────────
          os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)

          if mode == 'append':
              with open(path, 'a', encoding='utf-8') as f:
                  f.write('\n' + content)
              print(f'Appended to {path}')
          elif mode == 'replace':
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'Replaced {path}')

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'EM_COMMIT_MSG={commit_msg}\n')
              f.write(f'EM_PATH={path}\n')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add "$EM_PATH"
          git diff --cached --quiet || git commit -m "$EM_COMMIT_MSG"
          git push

      - name: Close issue with success comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Em Action executed successfully.**\n\nPath: \`${{ env.EM_PATH }}\`\nCommit: ${{ env.EM_COMMIT_MSG }}\n\n*Relay closed.*`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Em Action failed or was blocked by policy.** Check the workflow run for details. Issue left open for review.`
            });
