name: em-metrics

on:
  schedule:
    # Every 4 hours — lightweight, just reads state files and writes JSON
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  generate-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate metrics snapshot
        run: python tools/em_metrics.py

      - name: Commit snapshot
        run: |
          git config user.name  "Em"
          git config user.email "em@forgecore.co"
          git add memory/metrics-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to snapshot — skipping commit"
          else
            git commit -m "chore: update metrics snapshot [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
