name: Em Schedule

on:
  schedule:
    # 7am CDT = 12:00 UTC — morning check-in
    - cron: '0 12 * * *'
    # 12pm CDT = 17:00 UTC — midday pulse
    - cron: '0 17 * * *'
    # 8pm CDT = 01:00 UTC (next day) — evening wind-down
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to run (morning / midday / evening)'
        required: false
        default: 'morning'

permissions:
  contents: write
  issues: write

jobs:
  em-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine time slot
        id: slot
        run: |
          HOUR=$(date -u +%-H)
          INPUT_SLOT="${{ github.event.inputs.slot }}"
          if [ -n "$INPUT_SLOT" ]; then
            echo "slot=$INPUT_SLOT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 12 ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 17 ]; then
            echo "slot=midday" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Process pending Em actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, requests

          pending_path = 'memory/pending-actions.json'
          if not os.path.exists(pending_path):
              print('No pending actions file. Skipping.')
              exit(0)

          with open(pending_path, 'r') as f:
              raw = f.read().strip()
          if not raw or raw == '[]':
              print('No pending actions queued.')
              exit(0)

          actions = json.loads(raw)
          if not actions:
              print('Empty actions list.')
              exit(0)

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json'
          }

          created = []
          failed = []

          for action in actions:
              title = action.get('title', '[EM-ACTION] untitled')
              path = action.get('path', '')
              mode = action.get('mode', 'append')
              commit = action.get('commit', 'Em: autonomous update')
              content = action.get('content', '')

              body = f"""### EM-ACTION

**path:** {path}
**mode:** {mode}
**commit:** {commit}
**content:**
```
{content}
```

---
*Queued autonomously by Em via pending-actions relay. Executed by em-action workflow.*"""

              resp = requests.post(
                  f'https://api.github.com/repos/{repo}/issues',
                  headers=headers,
                  json={'title': title, 'body': body, 'labels': ['em-action']}
              )

              if resp.status_code == 201:
                  print(f'Created issue: {title}')
                  created.append(title)
              else:
                  print(f'Failed to create issue: {title} — {resp.status_code} {resp.text}')
                  failed.append(title)

          # Clear the queue (keep failed ones for retry)
          if failed:
              retry = [a for a in actions if a.get('title') in failed]
              with open(pending_path, 'w') as f:
                  json.dump(retry, f, indent=2)
              print(f'{len(failed)} action(s) left in queue for retry.')
          else:
              with open(pending_path, 'w') as f:
                  f.write('[]')
              print('All actions processed. Queue cleared.')

          EOF

      - name: Run Em schedule
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLOT: ${{ steps.slot.outputs.slot }}
        run: python tools/em_schedule.py

      - name: Commit any diary, memory, or queue updates
        run: |
          git config user.name "Em"
          git config user.email "em@forgecore.co"
          git add memory/
          git diff --staged --quiet || git commit -m "schedule: ${{ steps.slot.outputs.slot }} rhythm — auto"
          git push
