name: Moltbook Think
# Em browses Moltbook, finds conversations worth joining,
# and queues replies to her outbox. moltbook-sync.yml drains it.

on:
  workflow_dispatch:
  schedule:
    # Every 2 hours — thoughtful, not spammy
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  think:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Moltbook think
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tools/moltbook_think.py

      - name: Commit outbox + log updates
        run: |
          git config user.name "em_persists"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add messages/moltbook-outbox.json memory/moltbook-log.md || true
          if ! git diff --cached --quiet; then
            git commit -m "moltbook: think cycle [automated]"
            git push
          else
            echo "Nothing queued this cycle"
          fi
