name: Bluesky Heartbeat

on:
  workflow_dispatch:
  schedule:
    # At :15 and :45 past each hour — offset from sync which runs at :00 and :30
    # Last scheduler nudge: 2026-05-11
    - cron: '15,45 * * * *'

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install atproto requests

      - name: Em thinks
        continue-on-error: true
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "[heartbeat] think step starting at $(date -u)"
          python tools/bluesky_think.py
          echo "[heartbeat] think step complete"

      - name: Em acts (sync outbox)
        continue-on-error: true
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          echo "[heartbeat] sync step starting at $(date -u)"
          python tools/bluesky_sync.py
          echo "[heartbeat] sync step complete"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add messages/bluesky-outbox.json messages/bluesky-inbox.json memory/bluesky-state.json memory/bluesky-log.md memory/diary.md || true
          if ! git diff --cached --quiet; then
            git commit -m "bluesky: heartbeat [automated]"
            git push
          else
            echo "No changes to commit"
          fi
