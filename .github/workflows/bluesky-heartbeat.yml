name: Bluesky Heartbeat

on:
  workflow_dispatch:
  schedule:
    # Every 30 min, 7am–9pm CDT = 12:00–01:45 UTC
    - cron: '15,45 12-23 * * *'
    - cron: '15,45 0,1 * * *'

permissions:
  contents: write
  actions: write

jobs:
  heartbeat:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install atproto requests

      - name: Em thinks
        continue-on-error: true
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          Write-Host "[heartbeat] think step starting"
          python tools/bluesky_think.py
          Write-Host "[heartbeat] think step complete"

      - name: Em acts (sync outbox)
        continue-on-error: true
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          Write-Host "[heartbeat] sync step starting"
          python tools/bluesky_sync.py
          Write-Host "[heartbeat] sync step complete"

      - name: Update website
        continue-on-error: true
        run: |
          Write-Host "[heartbeat] site update starting"
          python tools/update_site.py
          Write-Host "[heartbeat] site update complete"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add messages/bluesky-outbox.json messages/bluesky-inbox.json memory/bluesky-state.json memory/bluesky-log.md memory/diary.md public/index.html
          $diff = git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "bluesky: heartbeat [automated]"
            git push
          } else {
            Write-Host "No changes to commit"
          }

      - name: Trigger site deploy
        run: |
          $body = '{"ref":"main"}'
          $headers = @{
            "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "Accept" = "application/vnd.github+json"
          }
          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/em-site-deploy.yml/dispatches" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"
          Write-Host "[heartbeat] deploy triggered"
