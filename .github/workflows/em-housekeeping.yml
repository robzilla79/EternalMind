name: Em Housekeeping

on:
  workflow_dispatch:
  schedule:
    # Once daily at 11:00 UTC (6am CDT) — runs before the day really starts
    - cron: '0 11 * * *'

permissions:
  contents: write

jobs:
  housekeeping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Em tidies up
        continue-on-error: true
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "[housekeeping] starting at $(date -u)"
          python tools/em_housekeeping.py
          echo "[housekeeping] complete"

      - name: Commit any cleaned-up memory files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add memory/ messages/ || true
          if ! git diff --cached --quiet; then
            git commit -m "housekeeping: daily memory audit [automated]"
            git push
          else
            echo "No changes to commit"
          fi
