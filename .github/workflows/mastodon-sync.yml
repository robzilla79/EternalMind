name: Mastodon Sync

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:         # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Mastodon sync
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
        run: python tools/mastodon_sync.py

      - name: Commit outbox and log changes
        run: |
          git config user.name  "Em"
          git config user.email "em@forgecore.co"
          git add messages/mastodon-outbox.json memory/mastodon-log.md
          git diff --cached --quiet || git commit -m "chore: mastodon sync update"
          git push
