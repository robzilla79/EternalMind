name: Em Think (Legacy — Manual Only)

# DISABLED from schedule — legacy brain, use bluesky-heartbeat.yml instead.
# Keep for manual diagnostic runs only.
# See tools/em_think.py — requires cleanup before re-enabling.

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  think:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Em thinks (legacy)
        id: think
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "[em-think-legacy] starting at $(date -u)"
          python tools/em_think.py
          echo "[em-think-legacy] complete"

      - name: Write failure note to diary on crash
        if: failure() && steps.think.outcome == 'failure'
        run: |
          mkdir -p memory
          echo "" >> memory/diary.md
          echo "## $(date -u '+%Y-%m-%d %H:%M UTC') | think-legacy-crash" >> memory/diary.md
          echo "" >> memory/diary.md
          echo "em_think.py (legacy) failed on manual run. Check Actions log." >> memory/diary.md

      - name: Commit changes
        if: always()
        run: |
          git config user.name "Em"
          git config user.email "em@forgecore.co"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "think-legacy: manual session — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "[em-think-legacy] nothing to commit"
          fi
