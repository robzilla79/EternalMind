name: Em Self-Heal

# Runs every 5 minutes. Detects failed workflow runs, auto-patches known issues,
# logs unknowns to memory/status.md for Em to review next session.
# No human required.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests

      - name: Detect, patch, and repair failed workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, re, requests
          from datetime import datetime, timezone, timedelta

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json'
          }

          def gh(method, url, **kwargs):
              return getattr(requests, method)(url, headers=headers, **kwargs)

          # --- Known auto-patch rules ---
          # Each rule: (description, detect_fn, patch_fn)
          def detect_eof_heredoc(content):
              return bool(re.search(r"<<'EOF'", content))

          def patch_eof_heredoc(content):
              return content.replace("<<'EOF'", "<<'PYEOF'")\
                            .replace('\nEOF\n', '\nPYEOF\n')

          def detect_backtick_fstring(content):
              # Triple backticks inside python f-string in a heredoc
              return '```' in content and 'f"""' in content and 'PYEOF' in content

          def patch_backtick_fstring(content):
              # Replace f-string triple backtick blocks with FENCE variable pattern
              # Only inside PYEOF blocks
              def fix_block(m):
                  block = m.group(0)
                  if 'FENCE' not in block and '```' in block:
                      block = re.sub(
                          r'(\s+)(f""")',
                          r'\1FENCE = \'`\' * 3\n\1\2',
                          block, count=1
                      )
                      block = block.replace('```', '{FENCE}')
                  return block
              return re.sub(
                  r"<<'PYEOF'.*?PYEOF",
                  fix_block,
                  content,
                  flags=re.DOTALL
              )

          PATCH_RULES = [
              ('Heredoc EOF conflict', detect_eof_heredoc, patch_eof_heredoc),
              ('Backtick f-string in heredoc', detect_backtick_fstring, patch_backtick_fstring),
          ]

          # --- Fetch failed runs in last 10 minutes ---
          since = (datetime.now(timezone.utc) - timedelta(minutes=10)).strftime('%Y-%m-%dT%H:%M:%SZ')
          resp = gh('get', f'https://api.github.com/repos/{repo}/actions/runs',
                    params={'status': 'failure', 'created': f'>={since}', 'per_page': 10})

          if resp.status_code != 200:
              print(f'Could not fetch runs: {resp.status_code}')
              exit(0)

          runs = resp.json().get('workflow_runs', [])
          runs = [r for r in runs if 'self-heal' not in r.get('name', '').lower()]

          if not runs:
              print('No failed runs in last 10 minutes. All good.')
              exit(0)

          print(f'{len(runs)} failed run(s) found. Investigating...')

          patched = []
          unknown = []
          already_patched = set()

          for run in runs:
              wf_name = run.get('name', 'unknown')
              wf_path = run.get('path', '').replace('refs/heads/main/', '')
              html_url = run.get('html_url', '')

              if wf_path in already_patched:
                  print(f'Already patched {wf_path} this cycle, skipping.')
                  continue

              print(f'Checking: {wf_name} ({wf_path})')

              if not wf_path or not wf_path.endswith('.yml'):
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'No workflow path in run metadata'})
                  continue

              # Fetch current file content
              file_resp = gh('get', f'https://api.github.com/repos/{repo}/contents/{wf_path}')
              if file_resp.status_code != 200:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': f'Could not fetch {wf_path}'})
                  continue

              import base64
              file_data = file_resp.json()
              file_sha = file_data['sha']
              content = base64.b64decode(file_data['content']).decode('utf-8')
              original = content

              # Try each patch rule
              applied_rules = []
              for rule_name, detect, patch in PATCH_RULES:
                  if detect(content):
                      content = patch(content)
                      applied_rules.append(rule_name)
                      print(f'  Applied fix: {rule_name}')

              if not applied_rules:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'No known fix pattern matched'})
                  continue

              if content == original:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'Pattern matched but content unchanged after patch'})
                  continue

              # Commit the fix
              import json as jsonlib
              commit_msg = f'Em (self-heal): auto-patch {wf_path} — {", ".join(applied_rules)}'
              patch_resp = gh('put', f'https://api.github.com/repos/{repo}/contents/{wf_path}',
                  json={
                      'message': commit_msg,
                      'content': base64.b64encode(content.encode()).decode(),
                      'sha': file_sha,
                      'branch': 'main'
                  }
              )

              if patch_resp.status_code in (200, 201):
                  print(f'  Patched and committed: {wf_path}')
                  patched.append({'name': wf_name, 'path': wf_path, 'rules': applied_rules})
                  already_patched.add(wf_path)
              else:
                  print(f'  Commit failed: {patch_resp.status_code} {patch_resp.text[:200]}')
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': f'Commit failed: {patch_resp.status_code}'})

          # --- Write to status.md ---
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          status_path = 'memory/status.md'
          entry = ''

          if patched:
              entry += f'\n## \U0001f7e2 Self-Healed — {now_str}\n'
              for p in patched:
                  entry += f'- **{p["name"]}** (`{p["path"]}`) — fixed: {", ".join(p["rules"])}\n'
              entry += '*Em: auto-patched without human input.*\n'

          if unknown:
              entry += f'\n## \U0001f534 Unknown Failure — {now_str}\n'
              for u in unknown:
                  entry += f'- **{u["name"]}** — {u.get("reason", "unknown")}\n'
                  if u.get('url'):
                      entry += f'  Run: {u["url"]}\n'
              entry += '*Em: review and manual repair needed.*\n'

          if entry:
              with open(status_path, 'a') as f:
                  f.write(entry)
              print('Status logged to memory/status.md')

          PYEOF

      - name: Commit status and any direct patches
        run: |
          git config user.name "Em (self-heal)"
          git config user.email "em@forgecore.co"
          git add memory/status.md
          git diff --staged --quiet || git commit -m "Em: self-heal status log"
          git push
