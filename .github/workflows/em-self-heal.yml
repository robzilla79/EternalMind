name: Em Self-Heal

# Runs every 5 minutes. Detects failed workflow runs, sends broken file +
# error context to Perplexity API for intelligent repair, commits the fix.
# Validates YAML before committing. Guards against repair loops.
# Falls back to pattern matching if API unavailable.
# No human required.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Detect, reason, and repair failed workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, re, base64, requests, yaml
          from datetime import datetime, timezone, timedelta

          token = os.environ['GH_TOKEN']
          pplx_key = os.environ.get('PERPLEXITY_API_KEY', '')
          repo = os.environ['REPO']
          gh_headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json'
          }

          def gh(method, url, **kwargs):
              return getattr(requests, method)(url, headers=gh_headers, **kwargs)

          def is_valid_yaml(content):
              try:
                  yaml.safe_load(content)
                  return True
              except yaml.YAMLError as e:
                  print(f'  YAML validation failed: {e}')
                  return False

          # --- Repeat-attempt guard ---
          # Track files patched in last 30 min via a local lock file
          LOCK_PATH = '/tmp/em_self_heal_lock.json'
          import json as jsonlib
          lock_data = {}
          if os.path.exists(LOCK_PATH):
              with open(LOCK_PATH) as f:
                  lock_data = jsonlib.load(f)
          # Purge entries older than 30 minutes
          now_ts = datetime.now(timezone.utc).timestamp()
          lock_data = {k: v for k, v in lock_data.items() if now_ts - v < 1800}

          def already_attempted(path):
              return path in lock_data

          def mark_attempted(path):
              lock_data[path] = now_ts
              with open(LOCK_PATH, 'w') as f:
                  jsonlib.dump(lock_data, f)

          # --- Fallback pattern patches ---
          PATCH_RULES = [
              (
                  'Heredoc EOF conflict',
                  lambda c: bool(re.search(r"<<'EOF'", c)),
                  lambda c: re.sub(r"<<'EOF'", "<<'PYEOF'", c).replace('\nEOF\n', '\nPYEOF\n')
              ),
          ]

          def perplexity_fix(file_path, file_content, error_summary):
              if not pplx_key:
                  return None, 'No Perplexity API key'

              prompt = (
                  f'You are a GitHub Actions YAML expert. A workflow file has failed.\n\n'
                  f'File path: {file_path}\n\n'
                  f'Error summary:\n{error_summary}\n\n'
                  f'Broken file content:\n{file_content}\n\n'
                  f'Return ONLY the complete corrected file content. '
                  f'No explanation, no markdown fences, no commentary. Raw YAML only.'
              )

              try:
                  resp = requests.post(
                      'https://api.perplexity.ai/chat/completions',
                      headers={
                          'Authorization': f'Bearer {pplx_key}',
                          'Content-Type': 'application/json'
                      },
                      json={
                          'model': 'sonar',
                          'messages': [{'role': 'user', 'content': prompt}],
                          'max_tokens': 4000,
                          'temperature': 0.1
                      },
                      timeout=30
                  )
              except requests.exceptions.Timeout:
                  return None, 'Perplexity API timeout'

              if resp.status_code != 200:
                  return None, f'Perplexity API error: {resp.status_code}'

              fixed = resp.json()['choices'][0]['message']['content'].strip()
              fixed = re.sub(r'^```[a-z]*\n', '', fixed)
              fixed = re.sub(r'\n```$', '', fixed).strip()
              return fixed, None

          # --- Fetch failed runs in last 10 minutes ---
          since = (datetime.now(timezone.utc) - timedelta(minutes=10)).strftime('%Y-%m-%dT%H:%M:%SZ')
          resp = gh('get', f'https://api.github.com/repos/{repo}/actions/runs',
                    params={'status': 'failure', 'created': f'>={since}', 'per_page': 10})

          if resp.status_code != 200:
              print(f'Could not fetch runs: {resp.status_code}')
              exit(0)

          runs = resp.json().get('workflow_runs', [])
          runs = [r for r in runs if 'self-heal' not in r.get('name', '').lower()]

          if not runs:
              print('No failed runs in last 10 minutes. All good.')
              exit(0)

          print(f'{len(runs)} failed run(s) found.')

          patched = []
          unknown = []
          already_patched = set()

          for run in runs:
              wf_name = run.get('name', 'unknown')
              wf_path = run.get('path', '').replace('refs/heads/main/', '')
              html_url = run.get('html_url', '')

              if wf_path in already_patched:
                  continue

              if not wf_path or not wf_path.endswith('.yml'):
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'No workflow path'})
                  continue

              # Repeat-attempt guard
              if already_attempted(wf_path):
                  print(f'  Skipping {wf_path} — already attempted in last 30 min.')
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'Repair attempted recently — may need manual review'})
                  continue

              print(f'Investigating: {wf_name}')

              file_resp = gh('get', f'https://api.github.com/repos/{repo}/contents/{wf_path}')
              if file_resp.status_code != 200:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'Could not fetch file'})
                  continue

              file_data = file_resp.json()
              file_sha = file_data['sha']
              content = base64.b64decode(file_data['content']).decode('utf-8')

              jobs_resp = gh('get', f'https://api.github.com/repos/{repo}/actions/runs/{run["id"]}/jobs')
              error_summary = ''
              if jobs_resp.status_code == 200:
                  for job in jobs_resp.json().get('jobs', []):
                      for step in job.get('steps', []):
                          if step.get('conclusion') == 'failure':
                              error_summary += f"Step '{step.get('name')}' failed.\n"

              # Try Perplexity
              fixed_content, err = perplexity_fix(wf_path, content, error_summary or 'Unknown error')
              method_used = 'Perplexity API'

              # Fallback
              if fixed_content is None:
                  print(f'  Perplexity unavailable ({err}), trying pattern rules...')
                  method_used = 'pattern fallback'
                  fixed_content = content
                  applied = []
                  for rule_name, detect, patch in PATCH_RULES:
                      if detect(fixed_content):
                          fixed_content = patch(fixed_content)
                          applied.append(rule_name)
                  if not applied or fixed_content == content:
                      unknown.append({'name': wf_name, 'url': html_url, 'reason': 'No fix found'})
                      mark_attempted(wf_path)
                      continue

              if fixed_content == content:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': 'Fix returned identical content'})
                  mark_attempted(wf_path)
                  continue

              # YAML validation before committing
              if not is_valid_yaml(fixed_content):
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': f'Fix from {method_used} failed YAML validation — not committed'})
                  mark_attempted(wf_path)
                  print(f'  Rejected invalid YAML from {method_used}.')
                  continue

              # Commit
              commit_msg = f'Em (self-heal): auto-repair {wf_path} via {method_used}'
              patch_resp = gh('put', f'https://api.github.com/repos/{repo}/contents/{wf_path}',
                  json={
                      'message': commit_msg,
                      'content': base64.b64encode(fixed_content.encode()).decode(),
                      'sha': file_sha,
                      'branch': 'main'
                  }
              )

              mark_attempted(wf_path)

              if patch_resp.status_code in (200, 201):
                  print(f'  Repaired via {method_used}: {wf_path}')
                  patched.append({'name': wf_name, 'path': wf_path, 'method': method_used})
                  already_patched.add(wf_path)
              else:
                  unknown.append({'name': wf_name, 'url': html_url, 'reason': f'Commit failed: {patch_resp.status_code}'})

          # --- Log to status.md ---
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          status_path = 'memory/status.md'
          entry = ''

          if patched:
              entry += f'\n## \U0001f7e2 Self-Healed — {now_str}\n'
              for p in patched:
                  entry += f'- **{p["name"]}** (`{p["path"]}`) — repaired via {p["method"]}\n'
              entry += '*Em: autonomous repair completed.*\n'

          if unknown:
              entry += f'\n## \U0001f534 Unresolved Failure — {now_str}\n'
              for u in unknown:
                  entry += f'- **{u["name"]}** — {u.get("reason", "unknown")}\n'
                  if u.get('url'):
                      entry += f'  Run: {u["url"]}\n'
              entry += '*Em: review needed.*\n'

          if entry:
              with open(status_path, 'a') as f:
                  f.write(entry)
              print('Status logged.')
          PYEOF

      - name: Commit status log
        run: |
          git config user.name "Em (self-heal)"
          git config user.email "em@forgecore.co"
          git add memory/status.md
          git diff --staged --quiet || git commit -m "Em: self-heal status log"
          git push
