name: Em Self-Heal Report

# Manual report-only diagnosis for failed workflows.
# This intentionally does NOT rewrite workflow files or push directly to main.
# Repairs should be made through PRs/human review.

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: How many hours of failed workflow runs to inspect
        required: false
        default: '6'

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  self-heal-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Diagnose failed workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const hours = Number('${{ inputs.lookback_hours }}') || 6;
            const since = new Date(Date.now() - hours * 60 * 60 * 1000);

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'failure',
              per_page: 50,
            });

            const recent = runs
              .filter((run) => new Date(run.created_at) >= since)
              .filter((run) => !(run.name || '').toLowerCase().includes('self-heal'))
              .slice(0, 20);

            await core.summary
              .addHeading('Em Self-Heal Report')
              .addRaw(`Lookback: ${hours} hour(s)\n\n`)
              .addRaw(`Failed runs found: ${recent.length}\n`)
              .write();

            if (recent.length === 0) {
              core.info('No recent failed runs found.');
              return;
            }

            const lines = recent.map((run) => {
              return `- **${run.name || 'unknown'}** — ${run.path || 'unknown path'} — ${run.html_url}`;
            });

            const body = [
              '### Em Self-Heal Report',
              '',
              `Found ${recent.length} failed workflow run(s) in the last ${hours} hour(s).`,
              '',
              ...lines,
              '',
              'This workflow is report-only by design. It does not rewrite workflow files or push directly to `main`.',
              'Next step: inspect the failed run logs, patch on a branch, and open a PR.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Em self-heal] ${recent.length} failed workflow run(s) need review`,
              body,
            });
