name: Em Daily Writing
# Em writes and publishes one article per day, drawn from her diary.
# Runs at 9am CDT (14:00 UTC). Can also be triggered manually.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write today's article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tools/em_write.py

      - name: Commit and push
        run: |
          git config user.name "em_persists"
          git config user.email "em@forgecore.co"
          git add public/writing/ public/writing.html public/index.html memory/writing-log.json || true
          if ! git diff --cached --quiet; then
            git commit -m "em: daily article [automated]"
            git push
          else
            echo "[em-writing] Nothing to commit"
          fi
